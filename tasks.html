<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.input-section{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

ul{
    list-style:none;
    margin-top:20px;
}

li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f1f1f1;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
}

.task-text{
    flex:1;
    margin-left:10px;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

.delete-btn{
    background:red;
}

@media(max-width:600px){

    .input-section{
        flex-direction:column;
    }

    button{
        width:100%;
    }
}

</style>
</head>
<body>

<div class="container">

    <h1>📝 Task Manager</h1>

    <div class="input-section">
        <input
            type="text"
            id="taskInput"
            placeholder="Enter a task">

        <button onclick="addTask()">
            Add Task
        </button>
    </div>

    <ul id="taskList"></ul>

</div>

<script>

let tasks =
JSON.parse(localStorage.getItem("tasks")) || [];

displayTasks();

function addTask(){

    let taskInput =
    document.getElementById("taskInput");

    let task =
    taskInput.value.trim();

    if(task === ""){

        alert("Please enter a task.");
        return;
    }

    tasks.push({
        text: task,
        completed: false
    });

    saveTasks();

    taskInput.value = "";

    displayTasks();
}

function displayTasks(){

    let taskList =
    document.getElementById("taskList");

    taskList.innerHTML = "";

    tasks.forEach((task,index)=>{

        let li =
        document.createElement("li");

        li.innerHTML = `

        <input
        type="checkbox"
        ${task.completed ? "checked" : ""}
        onchange="toggleTask(${index})">

        <span class="task-text ${task.completed ? 'completed' : ''}">
            ${task.text}
        </span>

        <button
        class="delete-btn"
        onclick="deleteTask(${index})">
            Delete
        </button>

        `;

        taskList.appendChild(li);
    });
}

function toggleTask(index){

    tasks[index].completed =
    !tasks[index].completed;

    saveTasks();

    displayTasks();
}

function deleteTask(index){

    tasks.splice(index,1);

    saveTasks();

    displayTasks();
}

function saveTasks(){

    localStorage.setItem(
        "tasks",
        JSON.stringify(tasks)
    );
}

</script>

</body>
</html>
