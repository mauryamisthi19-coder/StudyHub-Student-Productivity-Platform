<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.quiz-container{
    width:90%;
    max-width:600px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

h2{
    margin-bottom:20px;
}

.option{
    display:block;
    margin:15px 0;
    font-size:18px;
}

input[type="radio"]{
    margin-right:10px;
}

button{
    margin-top:20px;
    padding:12px 20px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

@media(max-width:600px){

    .quiz-container{
        padding:25px;
    }

    .option{
        font-size:16px;
    }

    button{
        width:100%;
    }
}

</style>
</head>
<body>

<div class="quiz-container">

    <h2 id="question"></h2>

    <div id="options"></div>

    <button onclick="nextQuestion()">Next</button>

</div>

<script>

const quizData = [

{
    question:"HTML stands for?",
    options:[
        "Hyper Text Markup Language",
        "High Text Machine Language",
        "Hyper Transfer Markup Language",
        "None"
    ],
    answer:"Hyper Text Markup Language"
},

{
    question:"CSS is used for?",
    options:[
        "Styling",
        "Database",
        "Programming",
        "Networking"
    ],
    answer:"Styling"
},

{
    question:"JavaScript is used for?",
    options:[
        "Interactivity",
        "Storage",
        "Printing",
        "Scanning"
    ],
    answer:"Interactivity"
}

];

let currentQuestion = 0;
let score = 0;

loadQuestion();

function loadQuestion(){

    let q = quizData[currentQuestion];

    document.getElementById("question").innerText =
    q.question;

    let optionsHTML = "";

    q.options.forEach(option => {

        optionsHTML += `
        <label class="option">
            <input
                type="radio"
                name="answer"
                value="${option}">
            ${option}
        </label>
        `;
    });

    document.getElementById("options").innerHTML =
    optionsHTML;
}

function nextQuestion(){

    let selected =
    document.querySelector(
    'input[name="answer"]:checked');

    if(!selected){

        alert("Please select an answer.");
        return;
    }

    if(
        selected.value ===
        quizData[currentQuestion].answer
    ){
        score++;
    }

    currentQuestion++;

    if(currentQuestion < quizData.length){

        loadQuestion();

    }else{

        document.querySelector(".quiz-container")
        .innerHTML = `

        <h1>🎉 Quiz Completed</h1>

        <h2 style="margin-top:20px;">
            Your Score: ${score}/${quizData.length}
        </h2>

        <button onclick="location.reload()">
            Restart Quiz
        </button>

        `;
    }
}

</script>

</body>
</html>
