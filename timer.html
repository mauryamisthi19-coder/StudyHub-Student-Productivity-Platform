<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:500px;
    background:white;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

h1{
    margin-bottom:20px;
}

#timer{
    font-size:60px;
    font-weight:bold;
    margin:30px 0;
    color:#2563eb;
}

button{
    padding:12px 20px;
    margin:5px;
    cursor:pointer;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
}

button:hover{
    opacity:0.9;
}

@media(max-width:600px){

    #timer{
        font-size:45px;
    }

    button{
        width:100%;
        margin-top:10px;
    }
}

</style>

</head>
<body>

<div class="container">

    <h1>⏰ Pomodoro Timer</h1>

    <div id="timer">25:00</div>

    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>

</div>

<script>

let time = 25 * 60;
let timerInterval = null;

function updateDisplay(){

    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    document.getElementById("timer").innerText =
    `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
}

function startTimer(){

    if(timerInterval){
        return;
    }

    timerInterval = setInterval(() => {

        if(time > 0){

            time--;
            updateDisplay();

        }else{

            clearInterval(timerInterval);
            timerInterval = null;

            alert("🎉 Study Session Complete!");

        }

    },1000);
}

function pauseTimer(){

    clearInterval(timerInterval);
    timerInterval = null;
}

function resetTimer(){

    clearInterval(timerInterval);
    timerInterval = null;

    time = 25 * 60;

    updateDisplay();
}

updateDisplay();

</script>

</body>
</html>
